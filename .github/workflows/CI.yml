name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

env:
  APP_NAME: ffprobe
  CARGO_HOME: /tmp/cargo

jobs:
  build:
    name: Build — ${{ matrix.settings.target }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          # macOS arm64 — native runner
          - host: macos-15
            target: aarch64-apple-darwin
            macos_deployment_target: "11.0"

          # macOS x64 — native Intel runner
          - host: macos-15-intel
            target: x86_64-apple-darwin
            macos_deployment_target: "10.15"

          # Linux x64 musl — builds in node:24-alpine; tested on Alpine
          - host: ubuntu-24.04
            target: x86_64-unknown-linux-musl

          # Linux arm64 musl — builds in node:24-alpine; tested on Alpine
          - host: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl

          # Linux x64 gnu — builds in node:24 (Debian); tested on Debian
          - host: ubuntu-24.04
            target: x86_64-unknown-linux-gnu

          # Linux arm64 gnu — builds in node:24 (Debian); tested on Debian
          - host: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu

          # Windows x64 — MSYS2 builds static FFmpeg; MSVC toolchain builds napi
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            cargo_home: C:/cargo

    runs-on: ${{ matrix.settings.host }}

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          cache: npm

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          targets: ${{ matrix.settings.target }}

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        with:
          path: |
            ${{ matrix.settings.cargo_home || '/tmp/cargo' }}/registry/index/
            ${{ matrix.settings.cargo_home || '/tmp/cargo' }}/registry/cache/
            ${{ matrix.settings.cargo_home || '/tmp/cargo' }}/git/db/
            target/
          key: ${{ matrix.settings.target }}-cargo-${{ hashFiles('Cargo.lock',
            'Cargo.toml', '.cargo/config.toml') }}
          restore-keys: |
            ${{ matrix.settings.target }}-cargo-

      - name: Remove ffmpeg and install pkg-config
        if: ${{ runner.os == 'macOS' }}
        run: (brew unlink ffmpeg 2>/dev/null || true) && (brew install pkg-config
          2>/dev/null || true)

      - name: Cache static FFmpeg
        id: cache-ffmpeg
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        with:
          path: ${{ runner.os == 'Windows' && 'C:/ffmpeg-build/output' ||
            '/tmp/ffmpeg-build/output' }}
          key: ffmpeg-8.1-${{ matrix.settings.target }}-${{
            hashFiles('scripts/build-ffmpeg.sh') }}

      - name: Setup MSVC environment (Windows)
        if: ${{ runner.os == 'Windows' }}
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756  # v1
        with:
          arch: x64

      - name: Setup MSYS2 (Windows)
        if: ${{ runner.os == 'Windows' }}
        uses: msys2/setup-msys2@e9898307ac31d1a803454791be09ab9973336e1c  # v2
        with:
          msystem: MSYS
          update: false
          path-type: inherit
          install: make nasm perl diffutils

      - name: Build static FFmpeg (Windows)
        if: ${{ steps.cache-ffmpeg.outputs.cache-hit != 'true' && runner.os == 'Windows'
          }}
        shell: msys2 {0}
        run: WORKDIR=C:/ffmpeg-build FFMPEG_TOOLCHAIN=msvc bash scripts/build-ffmpeg.sh

      - name: Build static FFmpeg (macOS)
        if: ${{ steps.cache-ffmpeg.outputs.cache-hit != 'true' && runner.os == 'macOS'
          }}
        run: ./scripts/build-ffmpeg.sh

      - name: Build static FFmpeg (Linux)
        if: ${{ steps.cache-ffmpeg.outputs.cache-hit != 'true' && runner.os == 'Linux'
          }}
        uses: addnab/docker-run-action@4f65fabd2431ebc8d299f8e5a018d79a769ae185  # v3
        with:
          image: ${{ contains(matrix.settings.target, 'musl') && 'node:24-alpine' ||
            'node:24' }}
          options: >-
            --user 0:0 -v /tmp:/tmp -v ${{ github.workspace }}:/build -w /build
          run: |
            if [ -f /etc/alpine-release ]; then
              apk add --no-cache bash curl nasm gcc musl-dev make perl
            else
              apt-get update -qq
              apt-get install -y --no-install-recommends build-essential curl nasm perl pkg-config ca-certificates bzip2
            fi
            bash scripts/build-ffmpeg.sh

      - name: Build (Linux)
        if: ${{ runner.os == 'Linux' }}
        uses: addnab/docker-run-action@4f65fabd2431ebc8d299f8e5a018d79a769ae185  # v3
        with:
          image: ${{ contains(matrix.settings.target, 'musl') && 'node:24-alpine' ||
            'node:24' }}
          options: >-
            --user 0:0 -v /tmp:/tmp -v ${{ github.workspace }}:/build -w /build
          run: |
            if [ -f /etc/alpine-release ]; then
              apk add --no-cache build-base rustup clang21-dev
              rustup-init -y --default-toolchain stable --no-modify-path
            else
              apt-get update -qq
              apt-get install -y --no-install-recommends build-essential curl ca-certificates clang libclang-dev pkg-config
              curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --no-modify-path
            fi
            export PATH="$HOME/.cargo/bin:$PATH"
            npm ci && npm run build

      - name: Build (macOS)
        if: ${{ runner.os == 'macOS' }}
        run: npm ci && npm run build
        shell: bash
        env:
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.settings.macos_deployment_target }}

      - name: Test (macOS)
        if: ${{ runner.os == 'macOS' }}
        run: npm test

      - name: Test (Linux)
        if: ${{ runner.os == 'Linux' }}
        uses: addnab/docker-run-action@4f65fabd2431ebc8d299f8e5a018d79a769ae185  # v3
        with:
          image: ${{ contains(matrix.settings.target, 'musl') && 'node:24-alpine' ||
            'node:24' }}
          options: >-
            --user 0:0 -v ${{ github.workspace }}:/build -w /build
          run: npm test

      - name: Remove Git usr/bin from PATH (Windows)
        if: ${{ runner.os == 'Windows' }}
        shell: powershell
        run: |
          $newPath = ($env:PATH -split ';' | Where-Object { $_ -notlike '*Git\usr\bin*' }) -join ';'
          "PATH=$newPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build (Windows)
        if: ${{ runner.os == 'Windows' }}
        shell: cmd
        env:
          CARGO_HOME: C:/cargo
          FFMPEG_DIR: C:/ffmpeg-build/output
        run: npm ci && node_modules\.bin\napi build --platform --release --features
          static --js binding.js --dts binding.d.ts

      - name: Test (Windows)
        if: ${{ runner.os == 'Windows' }}
        run: npm test

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: bindings-${{ matrix.settings.target }}
          path: ${{ env.APP_NAME }}.*.node
          if-no-files-found: error

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [ build ]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - uses: cycjimmy/semantic-release-action@16ca923e6ccbb50770c415a0ccd43709a8c5f7a4  # v4.2.2
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [ build, release ]
    if: needs.release.outputs.new_release_published == 'true'
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - run: sudo npm install -g npm@latest && npm ci

      - name: Set package.json version
        run: npm version --ignore-scripts --no-git-tag-version ${{
          needs.release.outputs.new_release_version }}

      - name: Download all build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          path: artifacts
          pattern: bindings-*

      - name: Patch placeholder version in binding.js
        run: |
          node -e "
            const fs = require('fs');
            const version = require('./package.json').version;
            const file = 'binding.js';
            fs.writeFileSync(file, fs.readFileSync(file, 'utf8').replaceAll('0.0.0-placeholder', version));
          "

      - name: Create package dirs
        run: npx napi create-npm-dirs

      - name: Move artifacts into npm packages
        run: npx napi artifacts --output-dir ./artifacts --npm-dir ./npm

      - name: Publish child packages
        run: npx napi pre-publish -t npm --no-gh-release

      - name: Publish main package
        run: npm publish --access public
