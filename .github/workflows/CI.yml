name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  APP_NAME: ffprobe
  CARGO_HOME: /tmp/cargo

jobs:
  build:
    name: Build — ${{ matrix.settings.target }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          # macOS arm64 — native runner
          - host: macos-15
            target: aarch64-apple-darwin
            macos_deployment_target: "11.0"

          # macOS x64 — native Intel runner
          - host: macos-15-intel
            target: x86_64-apple-darwin
            macos_deployment_target: "10.15"

          # Linux x64 musl — builds in node:24-alpine; tested on Alpine
          - host: ubuntu-24.04
            target: x86_64-unknown-linux-musl

          # Linux arm64 musl — builds in node:24-alpine; tested on Alpine
          - host: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl

          # Linux x64 gnu — builds in node:24 (Debian); tested on Debian
          - host: ubuntu-24.04
            target: x86_64-unknown-linux-gnu

          # Linux arm64 gnu — builds in node:24 (Debian); tested on Debian
          - host: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu

    runs-on: ${{ matrix.settings.host }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - uses: actions/cache@v5
        with:
          path: |
            /tmp/cargo/registry/index/
            /tmp/cargo/registry/cache/
            /tmp/cargo/git/db/
            target/
          key: ${{ matrix.settings.target }}-cargo-${{ hashFiles('Cargo.lock', 'Cargo.toml', '.cargo/config.toml') }}
          restore-keys: |
            ${{ matrix.settings.target }}-cargo-

      - name: Remove ffmpeg and install pkg-config
        if: ${{ runner.os == 'macOS' }}
        run: (brew unlink ffmpeg 2>/dev/null || true) && (brew install pkg-config 2>/dev/null || true)

      - name: Cache static FFmpeg
        id: cache-ffmpeg
        uses: actions/cache@v5
        with:
          path: /tmp/ffmpeg-build/output
          key: ffmpeg-8.1-${{ matrix.settings.target }}-${{ hashFiles('scripts/build-ffmpeg.sh') }}

      - name: Build static FFmpeg (macOS)
        if: ${{ steps.cache-ffmpeg.outputs.cache-hit != 'true' && runner.os == 'macOS' }}
        run: ./scripts/build-ffmpeg.sh

      - name: Build static FFmpeg (Linux)
        if: ${{ steps.cache-ffmpeg.outputs.cache-hit != 'true' && runner.os == 'Linux' }}
        uses: addnab/docker-run-action@v3
        with:
          image: ${{ contains(matrix.settings.target, 'musl') && 'node:24-alpine' || 'node:24' }}
          options: >-
            --user 0:0
            -v /tmp:/tmp
            -v ${{ github.workspace }}:/build
            -w /build
          run: |
            if [ -f /etc/alpine-release ]; then
              apk add --no-cache bash curl nasm gcc musl-dev make perl
            else
              apt-get update -qq
              apt-get install -y --no-install-recommends build-essential curl nasm perl pkg-config ca-certificates bzip2
            fi
            bash scripts/build-ffmpeg.sh

      - name: Build (Linux)
        if: ${{ runner.os == 'Linux' }}
        uses: addnab/docker-run-action@v3
        with:
          image: ${{ contains(matrix.settings.target, 'musl') && 'node:24-alpine' || 'node:24' }}
          options: >-
            --user 0:0
            -v /tmp:/tmp
            -v ${{ github.workspace }}:/build
            -w /build
          run: |
            if [ -f /etc/alpine-release ]; then
              apk add --no-cache build-base rustup clang21-dev
              rustup-init -y --default-toolchain stable --no-modify-path
            else
              apt-get update -qq
              apt-get install -y --no-install-recommends build-essential curl ca-certificates clang libclang-dev pkg-config
              curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --no-modify-path
            fi
            export PATH="$HOME/.cargo/bin:$PATH"
            npm ci && npm run build

      - name: Build (macOS)
        if: ${{ runner.os == 'macOS' }}
        run: npm ci && npm run build
        shell: bash
        env:
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.settings.macos_deployment_target }}

      - name: Test (macOS)
        if: ${{ runner.os == 'macOS' }}
        run: npm test

      - name: Test (Linux)
        if: ${{ runner.os == 'Linux' }}
        uses: addnab/docker-run-action@v3
        with:
          image: ${{ contains(matrix.settings.target, 'musl') && 'node:24-alpine' || 'node:24' }}
          options: >-
            --user 0:0
            -v ${{ github.workspace }}:/build
            -w /build
          run: npm test

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: bindings-${{ matrix.settings.target }}
          path: ${{ env.APP_NAME }}.*.node
          if-no-files-found: error

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - uses: actions/checkout@v5

      - uses: cycjimmy/semantic-release-action@v4
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [build, release]
    if: needs.release.outputs.new_release_published == 'true'
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - run: npm ci

      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: bindings-*

      - name: Set package.json version
        run: npm version --ignore-scripts --no-git-tag-version ${{ needs.release.outputs.new_release_version }}

      - name: Set package versions
        run: npx napi version

      - name: Move artifacts into platform packages
        run: npx napi artifacts --dir artifacts

      - name: Publish main package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance
